<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#161b26" />
    <title>G&B Reinigung – Kalender</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: { extend: {
          colors: {
            brand: { 50:"#eef4ff",100:"#d9e6ff",200:"#bcd3ff",300:"#8eb6ff",400:"#598dff",500:"#3366ff",600:"#1f4ce6",700:"#1a3cba",800:"#1c3596",900:"#1d3177" },
            ink: { 800:"#1e2533", 900:"#161b26", 950:"#0e1119" },
          },
          fontFamily: { sans: ["Inter","system-ui","sans-serif"] },
        } },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <style>
      html, body, #app { height: 100%; }
      body { font-family: Inter, system-ui, sans-serif; background:#f3f4f6; margin:0; -webkit-font-smoothing:antialiased; }
      .btn-primary { display:inline-flex; align-items:center; justify-content:center; gap:.5rem; border-radius:.5rem; padding:.5rem 1rem; font-size:.875rem; font-weight:600; transition:all .15s; cursor:pointer; border:none; background:#3366ff; color:#fff; box-shadow:0 1px 2px rgba(0,0,0,.05); }
      .btn-primary:hover { background:#1f4ce6; } .btn-primary:active { transform:scale(.98); } .btn-primary:disabled { opacity:.5; cursor:not-allowed; }
      .btn-secondary { display:inline-flex; align-items:center; justify-content:center; gap:.5rem; border-radius:.5rem; padding:.5rem 1rem; font-size:.875rem; font-weight:600; transition:all .15s; cursor:pointer; background:#fff; color:#374151; border:1px solid #d1d5db; }
      .btn-secondary:hover { background:#f9fafb; }
      .input { width:100%; border-radius:.5rem; border:1px solid #d1d5db; background:#fff; padding:.5rem .75rem; font-size:16px; color:#111827; outline:none; transition:all .15s; box-sizing:border-box; }
      .input:focus { border-color:#3366ff; box-shadow:0 0 0 2px #d9e6ff; }
      .label { display:block; margin-bottom:.25rem; font-size:.875rem; font-weight:500; color:#374151; }
      .card { border-radius:.75rem; border:1px solid #e5e7eb; background:#fff; box-shadow:0 1px 2px rgba(0,0,0,.05); }
    </style>
  </head>

  <body>
    <div id="app"></div>
    <div id="modal-root"></div>

    <script type="module">
      // Reuse derselben Firebase-Konfiguration
      import { auth, db, ADMIN_EMAIL } from "./firebase-config.js";
      import {
        onAuthStateChanged, signInWithEmailAndPassword,
        createUserWithEmailAndPassword, signOut,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
      import {
        collection, addDoc, updateDoc, deleteDoc, doc,
        onSnapshot, query, orderBy, serverTimestamp,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      // ---------- Helfer ----------
      const esc = (s="") => String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
      const pad = n => String(n).padStart(2,"0");
      const ymd = (y,m,d) => `${y}-${pad(m+1)}-${pad(d)}`;
      const todayStr = () => { const t=new Date(); return ymd(t.getFullYear(),t.getMonth(),t.getDate()); };
      const MONATE = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
      const WTAGE = ["Mo","Di","Mi","Do","Fr","Sa","So"];
      const REINIGUNGSARTEN = ["Fensterreinigung","Treppenhausreinigung","Grundreinigung","Außenreinigung","Sonstiges"];
      const fmtDatum = (s) => { const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d).toLocaleDateString("de-DE",{weekday:"long",day:"2-digit",month:"long",year:"numeric"}); };
      const mapsLink = a => `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(a||"")}`;
      const authErr = code => ({
        "auth/invalid-email":"Ungültige E-Mail-Adresse.","auth/wrong-password":"Falsches Passwort.",
        "auth/invalid-credential":"E-Mail oder Passwort ist falsch.","auth/too-many-requests":"Zu viele Versuche. Bitte später erneut.",
      }[code] || "Anmeldung fehlgeschlagen. Bitte erneut versuchen.");

      const $app = document.getElementById("app");
      const $modal = document.getElementById("modal-root");
      const closeModal = () => { $modal.innerHTML = ""; };

      // ---------- Zustand ----------
      const state = {
        user: null,
        termine: [],
        year: new Date().getFullYear(),
        month: new Date().getMonth(),
      };
      let unsubTermine = null;

      // ===========================================================
      //  Auth
      // ===========================================================
      onAuthStateChanged(auth, (user) => {
        if (unsubTermine) { unsubTermine(); unsubTermine = null; }
        state.user = user;
        state.termine = [];
        if (!user) { renderLogin(); return; }
        // Termine live laden
        unsubTermine = onSnapshot(query(collection(db,"termine"), orderBy("datum","asc")), (snap) => {
          state.termine = snap.docs.map(d => ({ id:d.id, ...d.data() }));
          renderApp();
        }, (e)=>console.error(e));
        renderApp();
      });

      function renderLogin(error="") {
        $app.innerHTML = `
          <div class="relative flex min-h-screen items-center justify-center bg-ink-950 p-4">
            <div class="pointer-events-none absolute inset-0 bg-gradient-to-br from-ink-900 via-ink-950 to-black"></div>
            <div class="relative w-full max-w-sm">
              <div class="mb-8 text-center">
                <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-brand-500 text-xl font-extrabold text-white shadow-lg">G&B</div>
                <h1 class="text-2xl font-bold text-white">G&B Reinigung</h1>
                <p class="mt-1 text-sm text-gray-400">Gemeinsamer Auftrags-Kalender</p>
              </div>
              <form id="loginForm" class="rounded-2xl bg-white p-6 shadow-2xl">
                <h2 class="mb-5 text-lg font-semibold text-gray-900">Anmelden</h2>
                <div id="loginError" class="${error?"":"hidden"} mb-4 rounded-lg bg-red-50 px-3 py-2 text-sm text-red-700">${esc(error)}</div>
                <div class="mb-4"><label class="label" for="email">E-Mail</label><input id="email" type="email" required class="input" value="${ADMIN_EMAIL}" /></div>
                <div class="mb-6"><label class="label" for="password">Passwort</label><input id="password" type="password" required class="input" placeholder="••••••••" autocomplete="current-password" /></div>
                <button id="loginBtn" type="submit" class="btn-primary w-full py-2.5">Anmelden</button>
              </form>
              <p class="mt-6 text-center text-xs text-gray-500">© ${new Date().getFullYear()} G&B Reinigung</p>
            </div>
          </div>`;
        document.getElementById("loginForm").addEventListener("submit", handleLogin);
      }

      async function handleLogin(e) {
        e.preventDefault();
        const email = document.getElementById("email").value.trim();
        const pw = document.getElementById("password").value;
        const btn = document.getElementById("loginBtn");
        const errBox = document.getElementById("loginError");
        const showErr = m => { errBox.textContent=m; errBox.classList.remove("hidden"); };
        btn.disabled = true; btn.textContent = "Anmelden …";
        try {
          await signInWithEmailAndPassword(auth, email, pw);
        } catch (err) {
          if (email === ADMIN_EMAIL && (err.code==="auth/user-not-found" || err.code==="auth/invalid-credential")) {
            try { await createUserWithEmailAndPassword(auth, email, pw); return; }
            catch (err2) { showErr(err2.code==="auth/email-already-in-use" ? "Falsches Passwort." : authErr(err2.code)); }
          } else { showErr(authErr(err.code)); }
          btn.disabled = false; btn.textContent = "Anmelden";
        }
      }

      // ===========================================================
      //  Kalender
      // ===========================================================
      function termineAm(dateStr) {
        return state.termine.filter(t => t.datum === dateStr)
          .sort((a,b)=>(a.uhrzeit||"").localeCompare(b.uhrzeit||""));
      }

      function renderApp() {
        if (!state.user) return;
        const { year, month } = state;
        const heute = todayStr();

        // Monats-Statistik (Abrechnungsstunden)
        const imMonat = state.termine.filter(t => { const [y,m]=t.datum.split("-").map(Number); return y===year && (m-1)===month; });
        const stundenSumme = imMonat.reduce((s,t)=>s+(Number(t.stunden)||0),0);
        const offen = imMonat.filter(t=>!t.erledigt).length;

        // Grid aufbauen (Montag-Start)
        const firstOffset = (new Date(year, month, 1).getDay() + 6) % 7;
        const daysInMonth = new Date(year, month+1, 0).getDate();
        let cells = "";
        for (let i=0;i<firstOffset;i++) cells += `<div class="min-h-[88px] rounded-lg bg-gray-50/60"></div>`;
        for (let d=1; d<=daysInMonth; d++) {
          const ds = ymd(year, month, d);
          const liste = termineAm(ds);
          const istHeute = ds === heute;
          const chips = liste.slice(0,3).map(t => {
            const col = t.erledigt ? "bg-green-100 text-green-700" : "bg-brand-100 text-brand-700";
            return `<div class="truncate rounded px-1 py-0.5 text-[11px] font-medium ${col}">${t.uhrzeit?esc(t.uhrzeit)+" ":""}${esc(t.titel)}</div>`;
          }).join("");
          const mehr = liste.length>3 ? `<div class="px-1 text-[11px] font-medium text-gray-400">+${liste.length-3} mehr</div>` : "";
          cells += `<button data-day="${ds}" class="flex min-h-[88px] flex-col gap-0.5 rounded-lg border ${istHeute?"border-brand-400 bg-brand-50/40":"border-gray-100 bg-white hover:bg-gray-50"} p-1.5 text-left transition">
            <div class="mb-0.5 flex items-center justify-between">
              <span class="text-xs font-semibold ${istHeute?"flex h-5 w-5 items-center justify-center rounded-full bg-brand-500 text-white":"text-gray-500"}">${d}</span>
            </div>${chips}${mehr}
          </button>`;
        }

        $app.innerHTML = `
          <div class="min-h-screen bg-gray-100">
            <header class="flex items-center justify-between bg-ink-900 px-4 py-3 text-white shadow">
              <div class="flex items-center gap-2"><div class="flex h-8 w-8 items-center justify-center rounded-lg bg-brand-500 text-xs font-extrabold">G&B</div><span class="font-semibold">Auftrags-Kalender</span></div>
              <button data-action="logout" class="text-sm font-medium text-gray-300 hover:text-white">Abmelden</button>
            </header>

            <main class="mx-auto max-w-5xl p-4 md:p-6">
              <!-- Steuerleiste -->
              <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
                <div class="flex items-center gap-2">
                  <button data-action="prev" class="btn-secondary px-3 py-2">‹</button>
                  <h1 class="min-w-[180px] text-center text-xl font-bold text-gray-900">${MONATE[month]} ${year}</h1>
                  <button data-action="next" class="btn-secondary px-3 py-2">›</button>
                  <button data-action="heute" class="btn-secondary">Heute</button>
                </div>
                <button data-action="neu" class="btn-primary">+ Neuer Termin</button>
              </div>

              <!-- Statistik -->
              <div class="mb-4 grid grid-cols-3 gap-3">
                <div class="card p-3"><div class="text-2xl font-bold text-gray-900">${imMonat.length}</div><div class="text-xs font-medium text-gray-500">Termine im Monat</div></div>
                <div class="card p-3"><div class="text-2xl font-bold text-gray-900">${offen}</div><div class="text-xs font-medium text-gray-500">noch offen</div></div>
                <div class="card p-3"><div class="text-2xl font-bold text-gray-900">${stundenSumme.toLocaleString("de-DE")}</div><div class="text-xs font-medium text-gray-500">Abrechnungsstunden</div></div>
              </div>

              <!-- Wochentage -->
              <div class="mb-1 grid grid-cols-7 gap-1.5 text-center text-xs font-semibold uppercase tracking-wide text-gray-400">
                ${WTAGE.map(w=>`<div>${w}</div>`).join("")}
              </div>
              <!-- Kalender-Grid -->
              <div class="grid grid-cols-7 gap-1.5">${cells}</div>

              <p class="mt-4 text-center text-xs text-gray-400">Tippe auf einen Tag, um Termine zu sehen oder hinzuzufügen.</p>
            </main>
          </div>`;

        $app.querySelector('[data-action="logout"]').addEventListener("click",()=>signOut(auth));
        $app.querySelector('[data-action="prev"]').addEventListener("click",()=>{ if(--state.month<0){state.month=11;state.year--;} renderApp(); });
        $app.querySelector('[data-action="next"]').addEventListener("click",()=>{ if(++state.month>11){state.month=0;state.year++;} renderApp(); });
        $app.querySelector('[data-action="heute"]').addEventListener("click",()=>{ const t=new Date(); state.year=t.getFullYear(); state.month=t.getMonth(); renderApp(); });
        $app.querySelector('[data-action="neu"]').addEventListener("click",()=>openTerminModal(todayStr(), null));
        $app.querySelectorAll("[data-day]").forEach(b=>b.addEventListener("click",()=>openDayModal(b.dataset.day)));
      }

      // ---------- Tages-Übersicht ----------
      function openDayModal(dateStr) {
        const liste = termineAm(dateStr);
        const items = liste.length ? liste.map(t => `
          <div class="card p-3">
            <div class="flex items-start justify-between gap-2">
              <div class="min-w-0">
                <div class="flex items-center gap-2"><h4 class="font-semibold text-gray-900">${esc(t.titel)}</h4>${t.erledigt?`<span class="rounded-full bg-green-100 px-2 py-0.5 text-[11px] font-semibold text-green-700">Erledigt</span>`:""}</div>
                <div class="mt-0.5 text-sm text-gray-500">${t.uhrzeit?`🕐 ${esc(t.uhrzeit)} Uhr · `:""}${t.reinigungsart?esc(t.reinigungsart):""}</div>
              </div>
              <div class="flex shrink-0 gap-1">
                <button data-edit="${t.id}" class="rounded-lg px-2 py-1 text-xs font-semibold text-brand-600 hover:bg-brand-50">Bearbeiten</button>
                <button data-del="${t.id}" class="rounded-lg px-2 py-1 text-xs font-semibold text-red-600 hover:bg-red-50">Löschen</button>
              </div>
            </div>
            <div class="mt-2 space-y-1 text-sm text-gray-600">
              ${t.ort?`<div>📍 <a href="${mapsLink(t.ort)}" target="_blank" rel="noreferrer" class="text-brand-600 hover:underline">${esc(t.ort)}</a></div>`:""}
              ${t.mitarbeiter?`<div>👤 ${esc(t.mitarbeiter)}</div>`:""}
              ${(t.stunden!==undefined&&t.stunden!=="")?`<div>⏱️ ${esc(String(t.stunden))} Std abgerechnet</div>`:""}
              ${t.notizen?`<div class="rounded-lg bg-amber-50 px-2 py-1.5 text-amber-800"><span class="font-medium">Notiz:</span> ${esc(t.notizen)}</div>`:""}
            </div>
            <div class="mt-2"><button data-toggle="${t.id}" class="text-xs font-medium ${t.erledigt?"text-gray-500":"text-green-600"} hover:underline">${t.erledigt?"↩ Als offen markieren":"✅ Als erledigt markieren"}</button></div>
          </div>`).join("") :
          `<p class="rounded-xl border border-dashed border-gray-300 bg-gray-50 px-4 py-8 text-center text-sm text-gray-400">Keine Termine an diesem Tag.</p>`;

        $modal.innerHTML = `
          <div class="fixed inset-0 z-50 flex items-end justify-center bg-black/50 sm:items-center sm:p-4">
            <div class="flex max-h-[92vh] w-full max-w-lg flex-col overflow-hidden rounded-t-2xl bg-white shadow-2xl sm:rounded-2xl">
              <div class="flex items-center justify-between border-b border-gray-200 px-5 py-4">
                <h3 class="text-base font-semibold capitalize text-gray-900">${fmtDatum(dateStr)}</h3>
                <button data-m="close" class="p-1 text-gray-400">✕</button>
              </div>
              <div class="flex-1 space-y-3 overflow-y-auto px-5 py-4">${items}</div>
              <div class="border-t border-gray-200 p-4"><button data-add class="btn-primary w-full py-2.5">+ Termin hinzufügen</button></div>
            </div>
          </div>`;

        $modal.querySelector('[data-m="close"]').addEventListener("click",closeModal);
        $modal.querySelector("[data-add]").addEventListener("click",()=>openTerminModal(dateStr,null));
        $modal.querySelectorAll("[data-edit]").forEach(b=>b.addEventListener("click",()=>openTerminModal(dateStr, state.termine.find(t=>t.id===b.dataset.edit))));
        $modal.querySelectorAll("[data-del]").forEach(b=>b.addEventListener("click",()=>delTermin(b.dataset.del, dateStr)));
        $modal.querySelectorAll("[data-toggle]").forEach(b=>b.addEventListener("click",()=>toggleErledigt(state.termine.find(t=>t.id===b.dataset.toggle), dateStr)));
      }

      async function delTermin(id, dateStr) {
        if (!confirm("Diesen Termin wirklich löschen?")) return;
        try { await deleteDoc(doc(db,"termine",id)); openDayModal(dateStr); }
        catch(e){ console.error(e); alert("Löschen fehlgeschlagen."); }
      }
      async function toggleErledigt(t, dateStr) {
        if(!t) return;
        try { await updateDoc(doc(db,"termine",t.id), { erledigt: !t.erledigt }); setTimeout(()=>openDayModal(dateStr),150); }
        catch(e){ console.error(e); alert("Aktualisieren fehlgeschlagen."); }
      }

      // ---------- Termin anlegen / bearbeiten ----------
      function openTerminModal(dateStr, t) {
        const isEdit = !!t;
        const f = {
          titel: t?.titel||"", ort: t?.ort||"",
          art: t?.reinigungsart || REINIGUNGSARTEN[0],
          datum: t?.datum || dateStr,
          uhrzeit: t?.uhrzeit || "",
          stunden: (t?.stunden!==undefined ? String(t.stunden) : ""),
          mitarbeiter: t?.mitarbeiter || "",
          notizen: t?.notizen || "",
          erledigt: !!t?.erledigt,
        };
        $modal.innerHTML = `
          <div class="fixed inset-0 z-50 flex items-end justify-center bg-black/50 sm:items-center sm:p-4">
            <div class="flex max-h-[95vh] w-full max-w-lg flex-col overflow-hidden rounded-t-2xl bg-white shadow-2xl sm:rounded-2xl">
              <div class="flex items-center justify-between border-b border-gray-200 px-5 py-4">
                <h3 class="text-base font-semibold text-gray-900">${isEdit?"Termin bearbeiten":"Neuer Termin"}</h3>
                <button data-m="close" class="p-1 text-gray-400">✕</button>
              </div>
              <div class="flex-1 space-y-4 overflow-y-auto px-5 py-4">
                <div id="tErr" class="hidden rounded-lg bg-red-50 px-3 py-2 text-sm text-red-700"></div>
                <div><label class="label">Auftrag / Kunde *</label><input id="tTitel" class="input" value="${esc(f.titel)}" placeholder="z.B. Bürohaus Lindenallee – Fenster" /></div>
                <div><label class="label">Adresse</label><input id="tOrt" class="input" value="${esc(f.ort)}" placeholder="Straße Nr., PLZ Ort" /></div>
                <div class="grid grid-cols-2 gap-3">
                  <div><label class="label">Datum *</label><input id="tDatum" type="date" class="input" value="${f.datum}" /></div>
                  <div><label class="label">Uhrzeit</label><input id="tUhrzeit" type="time" class="input" value="${f.uhrzeit}" /></div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                  <div><label class="label">Art der Reinigung</label><select id="tArt" class="input">${REINIGUNGSARTEN.map(x=>`<option ${f.art===x?"selected":""}>${x}</option>`).join("")}</select></div>
                  <div><label class="label">Abrechnungsstunden</label><input id="tStunden" type="number" min="0" step="0.5" class="input" value="${esc(f.stunden)}" placeholder="z.B. 3.5" /></div>
                </div>
                <div><label class="label">Mitarbeiter / wer macht's</label><input id="tMitarbeiter" class="input" value="${esc(f.mitarbeiter)}" placeholder="z.B. Ali & Bahar" /></div>
                <div><label class="label">Notizen</label><textarea id="tNotizen" class="input min-h-[80px] resize-y" placeholder="z.B. Schlüssel beim Hausmeister, 2. Stock">${esc(f.notizen)}</textarea></div>
                <label class="flex items-center gap-2 text-sm font-medium text-gray-700"><input id="tErledigt" type="checkbox" ${f.erledigt?"checked":""} class="h-4 w-4 rounded border-gray-300" /> Bereits erledigt</label>
              </div>
              <div class="flex items-center justify-end gap-3 border-t border-gray-200 px-5 py-4">
                <button data-m="close" class="btn-secondary">Abbrechen</button>
                <button data-m="save" class="btn-primary">${isEdit?"Speichern":"Hinzufügen"}</button>
              </div>
            </div>
          </div>`;

        $modal.querySelector('[data-m="close"]').addEventListener("click",closeModal);
        $modal.querySelector('[data-m="save"]').addEventListener("click",()=>saveTermin(t));
      }

      async function saveTermin(t) {
        const g = id => $modal.querySelector(id);
        const err = m => { const e=g("#tErr"); e.textContent=m; e.classList.remove("hidden"); };
        const titel=g("#tTitel").value.trim();
        const datum=g("#tDatum").value;
        if(!titel) return err("Bitte Auftrag / Kunde angeben.");
        if(!datum) return err("Bitte ein Datum wählen.");

        const stRaw = g("#tStunden").value;
        const payload = {
          titel, ort:g("#tOrt").value.trim(), reinigungsart:g("#tArt").value,
          datum, uhrzeit:g("#tUhrzeit").value, stunden: stRaw==="" ? "" : Number(stRaw),
          mitarbeiter:g("#tMitarbeiter").value.trim(), notizen:g("#tNotizen").value.trim(),
          erledigt: g("#tErledigt").checked,
        };
        const btn=$modal.querySelector('[data-m="save"]'); btn.disabled=true; btn.textContent="Speichern …";
        try {
          if (t) await updateDoc(doc(db,"termine",t.id), payload);
          else await addDoc(collection(db,"termine"), { ...payload, erstelltAm: serverTimestamp(), erstelltVon: state.user.email });
          openDayModal(datum);
        } catch(e){ console.error(e); err("Speichern fehlgeschlagen."); btn.disabled=false; btn.textContent = t?"Speichern":"Hinzufügen"; }
      }
    </script>
  </body>
</html>
